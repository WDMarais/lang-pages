server {
    listen 80;
    server_name cn.wdmarais.dev;
    root /var/www/lang-pages;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|json|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
