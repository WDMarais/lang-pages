<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene Component · Mock</title>
<link rel="stylesheet" href="../shared/base.css">
<style>

.page { max-width: 680px; margin: 0 auto; padding: 3rem 2rem; }
.demo-label {
  font-size: 0.6rem; letter-spacing: 0.38em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 1.5rem; font-weight: 600;
}

.scene-pane {
  width: 100%; aspect-ratio: 1; max-width: 280px;
  background: var(--white);
  border: 1px solid var(--border); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}

.compound    { font-size: 2.4rem; font-weight: 300; color: var(--navy); margin: 1rem 0 0.15rem; }
.compound-py { font-size: 0.85rem; color: var(--red); margin-bottom: 1.5rem; display: none; }
body.show-py .compound-py { display: block; }

.attr-row {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 0.9rem;
}
.attr-key {
  font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--muted); font-weight: 600; width: 2.6rem; flex-shrink: 0;
}
.attr-opts { display: flex; gap: 0.38rem; flex-wrap: wrap; align-items: center; }
.attr-word-group { margin-left: auto; text-align: right; flex-shrink: 0; }
.attr-word { font-size: 1rem; font-weight: 500; color: var(--navy); }
.attr-py   { font-size: 0.7rem; color: var(--red); display: none; }
body.show-py .attr-py { display: block; }

.opt-shape {
  width: 32px; height: 32px;
  background: none; border: 1.5px solid var(--border); border-radius: 6px;
  cursor: pointer; padding: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.13s, background 0.13s;
}
.opt-shape:hover  { border-color: var(--muted); }
.opt-shape.active { border-color: var(--navy); background: var(--cream); }

.opt-size {
  background: none; border: 1.5px solid var(--border); border-radius: 50%;
  cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.13s, background 0.13s;
}
.opt-size:hover  { border-color: var(--muted); }
.opt-size.active { border-color: var(--navy); background: var(--cream); }

.opt-color {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  outline: 2px solid transparent; outline-offset: 2px;
  transition: outline-color 0.13s, transform 0.1s;
}
.opt-color:hover  { transform: scale(1.12); }
.opt-color.active { outline-color: var(--navy); }

</style>
</head>
<body>

<div id="controls">
  <button class="btn-ctrl" id="pyBtn" onclick="togglePy()">显示拼音</button>
</div>

<div class="page">
  <div class="demo-label">Scene · shape × size × color</div>

  <div class="scene-pane">
    <svg id="scene-svg" width="200" height="200" viewBox="0 0 100 100"></svg>
  </div>

  <div class="compound"    id="compound"></div>
  <div class="compound-py" id="compound-py"></div>

  <div class="attr-row">
    <div class="attr-key">shape</div>
    <div class="attr-opts" id="opts-shape"></div>
    <div class="attr-word-group">
      <div class="attr-word" id="word-shape"></div>
      <div class="attr-py"   id="py-shape"></div>
    </div>
  </div>

  <div class="attr-row">
    <div class="attr-key">size</div>
    <div class="attr-opts" id="opts-size"></div>
    <div class="attr-word-group">
      <div class="attr-word" id="word-size"></div>
      <div class="attr-py"   id="py-size"></div>
    </div>
  </div>

  <div class="attr-row">
    <div class="attr-key">color</div>
    <div class="attr-opts" id="opts-color"></div>
    <div class="attr-word-group">
      <div class="attr-word" id="word-color"></div>
      <div class="attr-py"   id="py-color"></div>
    </div>
  </div>
</div>

<script src="../shared/base.js"></script>
<script src="../shared/scene.js"></script>
<script>

const sel = { shape: 'circle', size: 'md', color: 'blue' };

const sceneSvg   = document.getElementById('scene-svg');
const compoundEl = document.getElementById('compound');
const compoundPy = document.getElementById('compound-py');

function render() {
  const sh = getShape(sel.shape), sz = getSize(sel.size), co = getColor(sel.color);
  const cp = compound(sel);

  renderScene(sceneSvg, sel);
  compoundEl.textContent = cp.zh;
  compoundPy.textContent = cp.py;

  document.getElementById('word-shape').textContent = sh.zh;
  document.getElementById('py-shape').textContent   = sh.py;
  document.getElementById('word-size').textContent  = sz.zh;
  document.getElementById('py-size').textContent    = sz.py;
  document.getElementById('word-color').textContent = co.zh;
  document.getElementById('py-color').textContent   = co.py;

  document.querySelectorAll('[data-opt-attr]').forEach(el => {
    el.classList.toggle('active', sel[el.dataset.optAttr] === el.dataset.optVal);
  });
}

function pick(attr, val) { sel[attr] = val; render(); }

SHAPES.forEach(sh => {
  const btn = document.createElement('button');
  btn.className = 'opt-shape';
  btn.title = sh.zh;
  btn.dataset.optAttr = 'shape';
  btn.dataset.optVal  = sh.id;
  btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24"><g fill="var(--navy)">${shapeIcon(sh.id)}</g></svg>`;
  btn.addEventListener('click', () => pick('shape', sh.id));
  document.getElementById('opts-shape').appendChild(btn);
});

SIZES.forEach(sz => {
  const btn = document.createElement('button');
  btn.className = 'opt-size';
  btn.style.cssText = `width:${sz.btn}px; height:${sz.btn}px;`;
  btn.title = sz.zh;
  btn.dataset.optAttr = 'size';
  btn.dataset.optVal  = sz.id;
  const d = sz.btn - 10;
  btn.innerHTML = `<svg width="${d}" height="${d}" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="var(--navy)"/></svg>`;
  btn.addEventListener('click', () => pick('size', sz.id));
  document.getElementById('opts-size').appendChild(btn);
});

COLORS.forEach(co => {
  const btn = document.createElement('button');
  btn.className = 'opt-color';
  btn.style.background = co.hex;
  if (co.stroke) btn.style.border = `2px solid ${co.stroke}`;
  btn.title = co.zh;
  btn.dataset.optAttr = 'color';
  btn.dataset.optVal  = co.id;
  btn.addEventListener('click', () => pick('color', co.id));
  document.getElementById('opts-color').appendChild(btn);
});

render();
</script>
</body>
</html>
