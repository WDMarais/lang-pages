<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合身程度</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #F8F6F1;
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}
.card {
  background: white; border-radius: 20px; padding: 2.5rem 2.5rem 2rem;
  border: 1px solid #E0DAD0; width: 380px; text-align: center;
  box-shadow: 0 6px 32px rgba(0,0,0,0.07);
}
.suit-wrap {
  height: 280px; display: flex; align-items: flex-start;
  justify-content: center; overflow: visible; padding-top: 0.5rem;
}
/* Only the body group animates — head group is a sibling and stays unscaled */
#suit-body {
  transition: transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
  transform-origin: 100px 62px;
}
.fit-info { margin: 1.2rem 0 0; min-height: 5.5rem; }
.fit-word {
  font-size: 3rem; font-weight: 900; line-height: 1;
  transition: color 0.2s; color: #1E2A4A;
}
.fit-py {
  font-size: 0.9rem; color: #C41E3A; letter-spacing: 0.1em;
  margin: 0.3rem 0 0.5rem;
}
.fit-zh {
  font-size: 0.88rem; color: #6B6B72; line-height: 1.6;
  min-height: 2.8rem; transition: color 0.2s;
}
.fit-zh strong { color: #1E2A4A; font-weight: 700; }

.slider-wrap { margin-top: 1.6rem; }
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 6px;
  border-radius: 3px; outline: none; cursor: grab;
  background: linear-gradient(to right, #C41E3A 0%, #2C6B3E 33%, #2C6B3E 66%, #C41E3A 100%);
}
input[type=range]:active { cursor: grabbing; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 24px; height: 24px;
  border-radius: 50%; background: white;
  border: 2.5px solid #1E2A4A;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  transition: transform 0.1s;
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.15); }
input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: white; border: 2.5px solid #1E2A4A;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.zone-labels {
  display: flex; justify-content: space-between;
  font-size: 0.85rem; margin-top: 0.5rem; font-weight: 700;
}
.zone-labels .neg { color: #C41E3A; }
.zone-labels .pos { color: #2C6B3E; }
</style>
</head>
<body>
<div class="card">

  <svg viewBox="0 0 200 340" width="170" xmlns="http://www.w3.org/2000/svg">

    <!-- ── BODY GROUP (scaled horizontally) ── -->
    <g id="suit-body">
      <!-- Trouser legs — centered: x=80..98 and x=102..120 -->
      <rect x="80"  y="268" width="18" height="68" rx="2" fill="#1E2A4A" stroke="#0D1525" stroke-width="1"/>
      <rect x="102" y="268" width="18" height="68" rx="2" fill="#1E2A4A" stroke="#0D1525" stroke-width="1"/>
      <line x1="89"  y1="268" x2="89"  y2="336" stroke="#2C3E6B" stroke-width="0.7"/>
      <line x1="111" y1="268" x2="111" y2="336" stroke="#2C3E6B" stroke-width="0.7"/>

      <!-- Jacket body -->
      <path d="M62,60 L36,102 L20,268 L88,268 L88,198 L112,198 L112,268 L180,268 L164,102 L138,60 Z"
            fill="#1E2A4A" stroke="#0D1525" stroke-width="1.3"/>

      <!-- Sleeves -->
      <path d="M62,60 L36,102 L22,212 L52,218 L84,112 Z"
            fill="#1E2A4A" stroke="#0D1525" stroke-width="1.3"/>
      <path d="M138,60 L164,102 L178,212 L148,218 L116,112 Z"
            fill="#1E2A4A" stroke="#0D1525" stroke-width="1.3"/>

      <!-- Lapels -->
      <path d="M88,60 L66,107 L88,138 Z"   fill="#2C3E6B"/>
      <path d="M112,60 L134,107 L112,138 Z" fill="#2C3E6B"/>

      <!-- Shirt / collar -->
      <path d="M88,60 L100,82 L112,60 L107,50 L100,57 L93,50 Z"
            fill="white" stroke="#ccc" stroke-width="0.6"/>

      <!-- Tie -->
      <polygon points="97,80 103,80 106,162 100,168 94,162"
               fill="#C41E3A" stroke="#8B0000" stroke-width="0.6"/>

      <!-- Centre seam -->
      <line x1="100" y1="132" x2="100" y2="268"
            stroke="#0D1525" stroke-width="0.7" stroke-dasharray="3,2.5"/>
    </g>

    <!-- ── HEAD GROUP (not scaled — always circular) ── -->
    <g id="suit-head">
      <circle cx="100" cy="26" r="19" fill="#2C3E6B" stroke="#1E2A4A" stroke-width="1.2"/>

      <!-- Eyebrows -->
      <path id="brow-l" d="M 88,18 Q 93,15 97,17"
            stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path id="brow-r" d="M 103,17 Q 107,15 112,18"
            stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Eyes -->
      <ellipse cx="93"  cy="24" rx="3" ry="3" fill="white"/>
      <ellipse cx="107" cy="24" rx="3" ry="3" fill="white"/>
      <circle  cx="93"  cy="24" r="1.4" fill="#1E2A4A"/>
      <circle  cx="107" cy="24" r="1.4" fill="#1E2A4A"/>

      <!-- Mouth — updated by JS -->
      <path id="mouth" d="M 90,36 Q 100,25 110,36"
            stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Sweat drop: tight only -->
      <path id="sweat" d="M 116,13 Q 119,8 122,13 Q 122,18 116,17 Z"
            fill="#74B9FF" opacity="0" style="transition: opacity 0.3s"/>

      <!-- Droop marks: baggy only -->
      <line id="droop-l" x1="87" y1="20" x2="84" y2="26"
            stroke="white" stroke-width="1.8" opacity="0" stroke-linecap="round"
            style="transition: opacity 0.3s"/>
      <line id="droop-r" x1="113" y1="20" x2="116" y2="26"
            stroke="white" stroke-width="1.8" opacity="0" stroke-linecap="round"
            style="transition: opacity 0.3s"/>
    </g>

  </svg>

  <div class="fit-info">
    <div class="fit-word" id="fit-word">合身</div>
    <div class="fit-py"   id="fit-py">héshēn</div>
    <div class="fit-zh"   id="fit-zh">裁缝把衣服改好了，穿起来终于<strong>合身</strong>了。</div>
  </div>

  <div class="slider-wrap">
    <input type="range" id="slider" min="0" max="100" value="38"
           oninput="update(this.value)">
    <div class="zone-labels">
      <span class="neg">紧</span>
      <span class="pos">合身</span>
      <span class="pos">宽松</span>
      <span class="neg">肥</span>
    </div>
  </div>

</div>
<script>
const zones = [
  {
    min: 0,  max: 25,
    word: '紧',  py: 'jǐn',
    zh: '肩膀那里有点儿<strong>紧</strong>，能帮我改大一点吗？',
    color: '#C41E3A', smile: false
  },
  {
    min: 25, max: 50,
    word: '合身', py: 'héshēn',
    zh: '裁缝把衣服改好了，穿起来终于<strong>合身</strong>了。',
    color: '#2C6B3E', smile: true
  },
  {
    min: 50, max: 75,
    word: '宽松', py: 'kuān sōng',
    zh: '她喜欢穿<strong>宽松</strong>的亚麻衬衫，夏天凉快又好看。',
    color: '#2C6B3E', smile: true
  },
  {
    min: 75, max: 101,
    word: '肥',  py: 'féi',
    zh: '裤子的腰那里有点儿<strong>肥</strong>，帮我改小一点。',
    color: '#C41E3A', smile: false
  },
];

function update(val) {
  const v = parseInt(val);
  const zone = zones.find(z => v >= z.min && v < z.max);

  // Scale only the body group — head stays circular
  // Anchored: v=37 → scale≈1.0 (合身 is the reference fit)
  const scale = (0.75 + (v / 100) * 0.67).toFixed(3);
  document.getElementById('suit-body').style.transform = `scaleX(${scale})`;

  // Mouth: smile curves UP (control y < endpoint y), frown curves DOWN
  // Endpoints fixed at y=36 for smile, y=28 for frown
  if (zone.smile) {
    // ∪ shape: control BELOW endpoints → smile (SVG y increases downward)
    document.getElementById('mouth').setAttribute('d', `M 90,32 Q 100,43 110,32`);
  } else {
    // ∩ shape: control ABOVE endpoints → frown
    const lift = zone.min === 0
      ? 26 - ((25 - v) / 25) * 5   // deeper frown further toward tight
      : 26 - ((v - 75) / 25) * 5;  // deeper frown further toward baggy
    document.getElementById('mouth').setAttribute('d', `M 90,38 Q 100,${lift.toFixed(1)} 110,38`);
  }

  // Eyebrows: worried (紧) or droopy (肥)
  if (v < 25) {
    document.getElementById('brow-l').setAttribute('d', 'M 88,20 Q 93,18 97,20');
    document.getElementById('brow-r').setAttribute('d', 'M 103,20 Q 107,18 112,20');
  } else if (v >= 75) {
    document.getElementById('brow-l').setAttribute('d', 'M 88,16 Q 93,15 97,18');
    document.getElementById('brow-r').setAttribute('d', 'M 103,18 Q 107,15 112,16');
  } else {
    document.getElementById('brow-l').setAttribute('d', 'M 88,18 Q 93,15 97,17');
    document.getElementById('brow-r').setAttribute('d', 'M 103,17 Q 107,15 112,18');
  }

  // Sweat drop when tight
  const sweat = v < 20 ? ((20 - v) / 20).toFixed(2) : 0;
  document.getElementById('sweat').setAttribute('opacity', sweat);

  // Droop lines when baggy
  const droop = v > 82 ? ((v - 82) / 18).toFixed(2) : 0;
  document.getElementById('droop-l').setAttribute('opacity', droop);
  document.getElementById('droop-r').setAttribute('opacity', droop);

  // Labels
  document.getElementById('fit-word').textContent  = zone.word;
  document.getElementById('fit-word').style.color  = zone.color;
  document.getElementById('fit-py').textContent    = zone.py;
  document.getElementById('fit-zh').innerHTML      = zone.zh;
}

update(38);
</script>
</body>
</html>
